<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blackjack Web</title>
    
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <h1>♠️♥️ Blackjack Online ♣️♦️</h1>
    <div class="main-content">
        <div id="loginScreen">
            <div class="login-container">
                <h1> LOGIN </h1>
                <input type="text" id="username" placeholder="Username">
                <input type="password" id="password" placeholder="Password">
                <button class="btn-start" id="btnLogin" onclick="login()"> Login </button>
                <p id="loginErrorMessage" style="color: red; display: none"> Wrong Password! Try again.</p>
            </div>
        </div>

        <div class="casino-table" id="gameBoard" style="display: none;">
            <div>
                <h2>Dealer</h2>
                <h3 id="dealerScoreDisplay">Scor: ?</h3>
                <div id="dealerCards" class="cards-container"></div>
            </div>

            <div style="margin-top: 40px;">
                <h2 id="playerNameDisplay">Jucător</h2>
                <div id="playerCards" class="cards-container"></div>
                <h3 id="playerScore">Scor: 0</h3>
            </div>

            <div style="margin-top: 30px;" id="actionButtons">
                <button class="btn-action" id="btnHit" onclick="hit()">☝️ Hit</button>
                <button class="btn-action" id="btnStand" onclick="stand()">✋ Stand</button>
                <button class="btn-start" id="btnPlayAgain" onclick="playAgain()" style="display: none;">🔄 Play Again</button>
            </div>
            
            <h2 id="gameMessage" style="color: #f1c40f; margin-top: 20px;"></h2>
        </div>
    </div>    
    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
